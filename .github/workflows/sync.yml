public static void fetchRate(OnRateLoaded callback) {
    new Thread(() -> {
        try {
            // 알렉스님의 GitHub Raw 주소
            String urlPath = "https://raw.githubusercontent.com/alexcha/exchange-api/refs/heads/main/api/v1/rates.json";
            HttpURLConnection conn = (HttpURLConnection) new URL(urlPath).openConnection();
            
            InputStream in = conn.getInputStream();
            Scanner s = new Scanner(in).useDelimiter("\\A");
            String jsonStr = s.hasNext() ? s.next() : "";
            
            JSONObject json = new JSONObject(jsonStr);
            JSONObject rates = json.getJSONObject("rates");

            // JSON의 Base가 KRW이므로, 여기서 USD 값은 '1원당 달러(0.00067...)'입니다.
            double krwToUsd = rates.getDouble("USD");
            
            new Handler(Looper.getMainLooper()).post(() -> callback.onLoaded(krwToUsd));
        } catch (Exception e) {
            e.printStackTrace();
        }
    }).start();
}
