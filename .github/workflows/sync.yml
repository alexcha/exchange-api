name: ChaCha-Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '30  * * * *'  # 1시간 주기 실행 (하루 24회)
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch and Process Exchange Rates
        run: |
          mkdir -p api/v1/history
          
          # 1. API 데이터 가져오기
          curl -s "https://openexchangerates.org/api/latest.json?app_id=${{ secrets.OER_APP_ID }}" > raw_rates.json
          curl -s "https://openexchangerates.org/api/currencies.json" > raw_names.json
          
          UTC_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          DATA_TIMESTAMP=$(cat raw_rates.json | jq -r '.timestamp | strftime("%Y-%m-%dT%H:%M:%SZ")')
          
          # 2. 메인 rates.json 생성
          cat raw_rates.json | jq --arg date "$UTC_TIME" --slurpfile names raw_names.json \
          '{
            base: .base,
            last_updated: $date,
            currencies: (
              .rates | to_entries | 
              map({code: .key, rate: .value, name: ($names[0][.key] // .key)}) | 
              map(select((.code | startswith("X") | not) and (.code | length == 3)))
            )
          }' > api/v1/rates.json

          # 3. 국가별 히스토리 데이터 생성 (.gz 압축 및 6개월 누적)
          CURRENCIES=$(cat api/v1/rates.json | jq -r '.currencies[].code')

          for CODE in $CURRENCIES; do
            FILE="api/v1/history/${CODE}.json"
            GZ_FILE="${FILE}.gz"
            RATE=$(cat raw_rates.json | jq -r ".rates.${CODE}")

            if [ "$RATE" != "null" ] && [ $(echo "$RATE > 0" | bc -l) -eq 1 ]; then
              if [ -f "$GZ_FILE" ]; then
                gunzip -c "$GZ_FILE" > "$FILE"
              fi
              if [ ! -f "$FILE" ]; then
                echo "{\"code\":\"$CODE\",\"base\":\"USD\",\"history\":[]}" > "$FILE"
              fi
              jq --arg full_date "$DATA_TIMESTAMP" --argjson val "$RATE" '
                .history += [{"d": $full_date, "v": $val}] | 
                .history |= (sort_by(.d) | unique_by(.d) | .[-4400:])
              ' "$FILE" > temp.json && mv temp.json "$FILE"
              gzip -n -9 -f "$FILE"
            fi
          done

      - name: Cleanup temporary files
        run: rm -f raw_rates.json raw_names.json

      - name: Push Changes
        run: |
          git config --global user.name "alexcha-bot"
          git config --global user.email "bot@alexcha.dev"
          
          # 1. 모든 변경사항(새 파일 포함)을 스테이징
          git add -A
          
          # 2. 커밋 생성
          if ! git diff --quiet --staged; then
            git commit -m "Hourly sync & history update (Gzip 6M): $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
            
            # 3. 안전한 전송을 위한 3단계 전략
            git fetch origin main
            git rebase origin/main || (git rebase --abort && git pull --no-rebase origin main)
            git push origin main
          else
            echo "No changes to commit"
          fi
