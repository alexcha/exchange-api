name: ChaCha-Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # 1시간 주기 실행 (하루 24회)
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Process Exchange Rates
        run: |
          mkdir -p api/v1/history
          
          # 1. API 데이터 및 통화 명칭 가져오기
          curl -s "https://openexchangerates.org/api/latest.json?app_id=${{ secrets.OER_APP_ID }}" > raw_rates.json
          curl -s "https://openexchangerates.org/api/currencies.json" > raw_names.json
          
          # ISO 8601 형식의 전체 시간 (예: 2026-05-09T04:00:00Z)
          UTC_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          # 2. 메인 rates.json 생성 (계산기용)
          cat raw_rates.json | jq --arg date "$UTC_TIME" --slurpfile names raw_names.json \
          '{
            base: .base,
            last_updated: $date,
            currencies: (
              .rates | to_entries | 
              map({
                code: .key,
                rate: .value,
                name: ($names[0][.key] // .key)
              }) | 
              map(select(
                (.code | startswith("X") | not) and
                (.code | length == 3)
              ))
            )
          }' > api/v1/rates.json

          # 3. 국가별 히스토리 데이터 생성 (차트용 - 시간 정보 포함)
          CURRENCIES=$(cat api/v1/rates.json | jq -r '.currencies[].code')
          
          # API 응답의 정확한 timestamp를 초 단위까지 포함한 ISO 8601 포맷으로 변환
          # 이 시각 정보가 있어야 앱에서 로컬 타임존 변환(UTC -> KST)이 가능함
          DATA_TIMESTAMP=$(cat raw_rates.json | jq -r '.timestamp | strftime("%Y-%m-%dT%H:%M:%SZ")')
          # 날짜 비교용 (unique_by 체크용)
          DATA_DATE=$(cat raw_rates.json | jq -r '.timestamp | strftime("%Y-%m-%d")')

          for CODE in $CURRENCIES; do
            FILE="api/v1/history/${CODE}.json"
            RATE=$(cat raw_rates.json | jq -r ".rates.${CODE}")

            if [ "$RATE" != "null" ] && [ $(echo "$RATE > 0" | bc -l) -eq 1 ]; then
              
              if [ ! -f "$FILE" ]; then
                echo "{\"code\":\"$CODE\",\"base\":\"USD\",\"history\":[]}" > "$FILE"
              fi

              # history 데이터의 "d" 필드에 시간 정보를 포함한 $DATA_TIMESTAMP를 저장
              # unique_by(.d | extract_date) 로직을 통해 로컬 변환 전 '날짜' 기준으로 중복 관리
              jq --arg full_date "$DATA_TIMESTAMP" --arg day_only "$DATA_DATE" --argjson val "$RATE" '
                .history += [{"d": $full_date, "v": $val}] | 
                .history |= (
                  reverse | 
                  unique_by(.d | .[0:10]) | 
                  reverse | 
                  .[-180:]
                )
              ' "$FILE" > temp.json && mv temp.json "$FILE"
              
            fi
          done

      - name: Push Changes
        run: |
          git config --global user.name "alexcha-bot"
          git config --global user.email "bot@alexcha.dev"
          
          git add api/v1/rates.json api/v1/history/*.json
          
          if ! git diff --quiet --staged; then
            git commit -m "Hourly sync & history update (UTC): $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
