name: ChaCha-Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Process Exchange Rates
        run: |
          mkdir -p api/v1
          # 1. 환율 및 국가 이름 데이터 가져오기
          curl -s "https://openexchangerates.org/api/latest.json?app_id=${{ secrets.OER_APP_ID }}" > raw_rates.json
          curl -s "https://openexchangerates.org/api/currencies.json" > raw_names.json
          
          UTC_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          # 2. 데이터를 병합하여 api/v1/rates.json 생성
          cat raw_rates.json | jq --arg date "$UTC_TIME" --slurpfile names raw_names.json \
          '{
            base: .base,
            last_updated: $date,
            currencies: (
              .rates | to_entries | map({
                code: .key,
                rate: .value,
                name: ($names[0][.key] // .key)
              })
            )
          }' > api/v1/rates.json

      - name: Push Changes
        run: |
          git config --global user.name "alexcha-bot"
          git config --global user.email "bot@alexcha.dev"
          git add api/v1/rates.json
          
          if ! git diff --quiet --staged; then
            git commit -m "Update exchange rates with names (UTC): $(date -u +'%Y-%m-%d %H:%M')"
            # 에러 해결 핵심: 푸시 전 원격의 최신 커밋을 가져와 합칩니다.
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
