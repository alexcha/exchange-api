Name: ChaCha-Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # 1시간 주기 실행 (하루 24회)
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Process Exchange Rates
        run: |
          mkdir -p api/v1/history
          
          # 1. API 데이터 및 통화 명칭 가져오기 (원본 로직 유지)
          curl -s "https://openexchangerates.org/api/latest.json?app_id=${{ secrets.OER_APP_ID }}" > raw_rates.json
          curl -s "https://openexchangerates.org/api/currencies.json" > raw_names.json
          
          UTC_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          # 2. 메인 rates.json 생성 (기존 계산기용 데이터 완벽 호환)
          cat raw_rates.json | jq --arg date "$UTC_TIME" --slurpfile names raw_names.json \
          '{
            base: .base,
            last_updated: $date,
            currencies: (
              .rates | to_entries | 
              map({
                code: .key,
                rate: .value,
                name: ($names[0][.key] // .key)
              }) | 
              map(select(
                (.code | startswith("X") | not) and
                (.code | length == 3)
              ))
            )
          }' > api/v1/rates.json

          # 3. 국가별 히스토리 데이터 생성 (차트용)
          # rates.json에서 필터링이 완료된 통화 코드만 추출
          CURRENCIES=$(cat api/v1/rates.json | jq -r '.currencies[].code')
          
          # API가 제공한 timestamp를 사용하여 정확한 날짜(UTC 기준) 매핑
          DATA_DATE=$(cat raw_rates.json | jq -r '.timestamp | strftime("%Y-%m-%d")')

          for CODE in $CURRENCIES; do
            FILE="api/v1/history/${CODE}.json"
            # raw_rates.json에서 해당 코드의 환율 추출
            RATE=$(cat raw_rates.json | jq -r ".rates.${CODE}")

            # 유효성 검사 (null이 아니고, 0보다 큰지 확인)
            if [ "$RATE" != "null" ] && [ $(echo "$RATE > 0" | bc -l) -eq 1 ]; then
              
              # 파일이 없으면 초기 구조 생성
              if [ ! -f "$FILE" ]; then
                echo "{\"code\":\"$CODE\",\"base\":\"USD\",\"history\":[]}" > "$FILE"
              fi

              # 임시 파일을 활용한 원자적 교체 (데이터 깨짐 방지)
              # reverse를 사용하여 동일 날짜 발생 시 나중에 들어온(최신) 값이 살아남도록 수정
              jq --arg date "$DATA_DATE" --argjson val "$RATE" '
                .history += [{"d": $date, "v": $val}] | 
                .history |= (reverse | unique_by(.d) | reverse | .[-180:])
              ' "$FILE" > temp.json && mv temp.json "$FILE"
              
            fi
          done

      - name: Push Changes
        run: |
          git config --global user.name "alexcha-bot"
          git config --global user.email "bot@alexcha.dev"
          
          git add api/v1/rates.json api/v1/history/*.json
          
          # 변경사항이 있을 때만 커밋
          if ! git diff --quiet --staged; then
            # [skip ci]를 추가하여 무한 루프 방지
            git commit -m "Hourly sync & history update (UTC): $(date -u +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
