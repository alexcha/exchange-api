name: ChaCha-Sync
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run
        run: |
          mkdir -p api/v1
          curl -s "https://openexchangerates.org/api/latest.json?app_id=${{ secrets.OER_APP_ID }}" > raw.json
          KRW_RATE=$(cat raw.json | jq '.rates.KRW')
          cat raw.json | jq --arg krw "$KRW_RATE" '{base: "KRW", rates: (.rates | map_values(. / ($krw | tonumber)))}' > api/v1/rates.json
      - name: Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "update" || exit 0
          git push
