name: Update Global Metro GeoJSON

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run GTFS to GeoJSON Converter
        env:
          MOBILITY_TOKEN: ${{ secrets.MOBILITY_TOKEN }}
        run: python m/gtfs_to_geojson.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p m/output
          
          if ls m/output/*.json 1> /dev/null 2>&1; then
            git add m/output/*.json
            
            if ! git diff --cached --quiet; then
              git commit -m "chore: 파이프라인 정기 메트로 데이터 업데이트 [skip ci]"
              git push
            else
              echo "변경사항이 없어 푸시를 건너뜁니다."
            fi
          else
            echo "⚠️ 경고: m/output/ 폴더 내에 생성된 JSON 파일이 없습니다."
          fi
